name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # Adicionamos este bloco para forçar a leitura do segredo
    env:
      API_KEY_SECRET: ${{ secrets.SECRET_API_SHEETS }}

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v3

      - name: Create config.js file 🤫
        # Agora usamos a variável de ambiente que criamos acima
        run: |
          echo "const API_KEY = '${{ env.API_KEY_SECRET }}';" > config.js
        
      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .