name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Roda sempre que houver uma atualização na branch 'main'

# Adiciona as permissões necessárias para o robô modificar o repositório
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v3

      - name: Create config.js file 🤫
        run: |
          echo "const API_KEY = '${{ secrets.SECRET_API_SHEETS }}';" > config.js
        
      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages # A branch onde o site será publicado
          folder: . # Publica a raiz do projeto (incluindo o novo config.js)